<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>How local LLM ninjas offload routine work without Claude</title>
<desc>Left to right: events (CI, PR, cron) trigger a ninja daemon on a generic local host running small 0.6 to 2b LLMs. The daemon reads and writes a memory store and calls tools like n8n and http apis, then posts to Slack, Linear, GitHub and Discord. Claude is not in the loop, so it costs zero subscription tokens.</desc>
